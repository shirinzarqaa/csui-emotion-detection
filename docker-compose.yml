version: "3.8"

services:
  mlflow-server:
    image: ghcr.io/mlflow/mlflow:v3.10.0
    container_name: mlflow-server
    ports:
      - "8002:8002"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 8002
      --backend-store-uri sqlite:////mlflow_data/mlflow.db
      --default-artifact-root /mlflow_data/artifacts
      --serve-artifacts
    volumes:
      - ./mlflow_data:/mlflow_data
